name: dbt CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  dbt-parse:
    name: Validate dbt project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dbt
        run: |
          pip install dbt-core dbt-snowflake

      - name: Create dbt profiles directory
        run: |
          mkdir -p ~/.dbt

      - name: Create dummy dbt profile
        run: |
          cat > ~/.dbt/profiles.yml << 'EOF'
          retail_analytics:
            outputs:
              dev:
                type: snowflake
                account: dummy
                user: dummy
                password: dummy
                role: dummy
                database: dummy
                warehouse: dummy
                schema: dummy
                threads: 4
                client_session_keep_alive: false
            target: dev
          EOF

      - name: Validate dbt project structure
        working-directory: retail_analytics
        run: |
          dbt parse