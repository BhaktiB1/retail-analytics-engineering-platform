name: dbt CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  dbt-parse:
    name: Validate dbt project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dbt
        run: |
          pip install dbt-core dbt-snowflake

      - name: Validate dbt project structure
        working-directory: retail_analytics
        run: |
          dbt parse